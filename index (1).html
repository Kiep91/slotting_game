:root{
  --bg:#15171c; --panel:#1e222a; --panel2:#242933; --line:#343c49;
  --accent:#f2b90d; --text:#eceada; --dim:#98a1b0;
}
*{box-sizing:border-box}
.app{min-height:100vh;background:
  repeating-linear-gradient(90deg, transparent 0 119px, rgba(255,255,255,.015) 119px 120px),
  var(--bg);
  color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  display:flex;flex-direction:column}
.hdr{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;
  padding:18px 22px;border-bottom:2px solid var(--accent)}
.hdr-left{display:flex;align-items:center;gap:14px}
.logo-mark{font-family:ui-monospace,Menlo,monospace;background:var(--accent);color:#15171c;
  font-weight:800;padding:8px 10px;font-size:14px;letter-spacing:1px;
  clip-path:polygon(0 0,100% 0,100% 70%,85% 100%,0 100%)}
h1{margin:0;font-size:20px;letter-spacing:3px;font-weight:800}
.sub{margin:2px 0 0;font-size:12px;color:var(--dim)}
.hdr-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{font:inherit;font-size:13px;font-weight:600;padding:9px 14px;border-radius:3px;cursor:pointer;
  border:1px solid var(--line);background:var(--panel);color:var(--text);letter-spacing:.3px}
.btn:hover{border-color:var(--accent)}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn.primary{background:var(--accent);color:#15171c;border-color:var(--accent);font-weight:800}
.btn.primary:disabled{background:var(--panel2);color:var(--dim);border-color:var(--line);cursor:not-allowed}
.btn.ghost{background:transparent}
.rules{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;
  padding:14px 22px;background:var(--panel);border-bottom:1px solid var(--line);font-size:12.5px;color:var(--dim);line-height:1.45}
.rules b{color:var(--accent);display:block;margin-bottom:3px;letter-spacing:.5px}
.body{display:flex;gap:0;flex:1;align-items:stretch;flex-wrap:wrap}
.tray{width:300px;min-width:260px;flex-shrink:0;border-right:1px solid var(--line);padding:14px;
  display:flex;flex-direction:column;gap:10px;max-height:calc(100vh - 90px);overflow-y:auto}
.tray-head{display:flex;justify-content:space-between;align-items:baseline}
.tray-title{font-size:11px;letter-spacing:2px;color:var(--dim);font-weight:700}
.tray-count{font-size:11px;color:var(--accent);font-family:ui-monospace,monospace}
.chips{display:flex;flex-direction:column;gap:6px}
.chip{display:flex;align-items:center;gap:8px;text-align:left;font:inherit;font-size:12.5px;
  background:var(--panel);border:1px solid var(--line);color:var(--text);padding:7px 9px;border-radius:3px;cursor:pointer}
.chip:hover{border-color:var(--sp)}
.chip.sel{border-color:var(--sp);background:var(--panel2);box-shadow:0 0 0 1px var(--sp)}
.chip.slotted{opacity:.32}
.chip-bar{width:4px;height:22px;background:var(--sp);flex-shrink:0;border-radius:1px}
.chip-name{flex:1;font-weight:600}
.chip-stats{display:flex;gap:7px;font-family:ui-monospace,monospace;font-size:10.5px;color:var(--dim)}
.chip-stats b{font-weight:500}
.sel-card{background:var(--panel2);border:1px solid var(--sp);border-left:4px solid var(--sp);padding:10px 12px;border-radius:3px}
.sel-name{font-weight:700;margin-bottom:6px}
.sel-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--dim);margin:3px 0}
.sel-hint{margin-top:7px;font-size:11px;color:var(--accent);letter-spacing:.5px}
.dots{display:flex;gap:3px}
.dot{width:9px;height:9px;border-radius:1px;background:var(--line)}
.dot.on{background:var(--sp,var(--accent))}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:auto;padding-top:8px;border-top:1px solid var(--line)}
.leg{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:5px}
.leg i{width:10px;height:10px;border-radius:2px;display:inline-block}
.racks{flex:1;min-width:340px;padding:16px 20px;overflow-x:auto}
.aisle-strip{display:grid;grid-template-columns:70px repeat(5,1fr);gap:6px;margin-bottom:10px;align-items:center}
.dock-tag{font-family:ui-monospace,monospace;font-size:11px;color:#15171c;background:var(--accent);
  padding:4px 6px;font-weight:800;text-align:center;clip-path:polygon(0 0,88% 0,100% 50%,88% 100%,0 100%)}
.bay-marker{font-family:ui-monospace,monospace;font-size:10.5px;color:var(--accent);text-align:center;
  border-top:2px solid var(--accent);padding-top:3px}
.rack{margin-bottom:16px}
.rack-label{font-size:11px;letter-spacing:2px;color:var(--dim);font-weight:700;margin-bottom:6px}
.rack-row{display:grid;grid-template-columns:70px repeat(5,1fr);gap:6px;margin-bottom:6px}
.lvl-tag{font-family:ui-monospace,monospace;font-size:10px;color:var(--dim);display:flex;align-items:center;justify-content:center;
  border:1px dashed var(--line);border-radius:3px}
.slot{position:relative;min-height:74px;border:1px solid var(--line);background:var(--panel);border-radius:3px;
  padding:7px 9px;text-align:left;font:inherit;color:var(--text);cursor:pointer;display:flex;flex-direction:column;gap:3px}
.slot.target:not(.full){border-style:dashed;border-color:var(--accent)}
.slot:hover{border-color:var(--accent)}
.slot.full{border-left:4px solid var(--sp);background:var(--panel2)}
.slot-code{font-family:ui-monospace,monospace;font-size:9.5px;color:var(--accent);letter-spacing:1px}
.slot-name{font-size:12px;font-weight:700;line-height:1.2}
.slot-meta{font-family:ui-monospace,monospace;font-size:10px;color:var(--dim)}
.slot-empty{font-size:11px;color:var(--dim);font-style:italic;margin:auto 0}
.foot-note{font-size:11.5px;color:var(--dim);margin-top:4px}
.simwrap{flex:1;min-height:520px;height:calc(100vh - 90px)}
.hud{position:absolute;top:14px;left:14px;background:rgba(21,23,28,.85);border:1px solid var(--line);
  border-left:4px solid var(--accent);padding:10px 14px;border-radius:3px;backdrop-filter:blur(4px)}
.hud-line{font-family:ui-monospace,monospace;font-size:13px;margin-bottom:3px}
.hud-label{color:var(--accent);font-size:10px;letter-spacing:1.5px;margin-right:8px}
.hud-current{font-size:12px;color:var(--dim);max-width:260px}
.skip{position:absolute;bottom:16px;right:16px}
.webgl-fail{display:flex;align-items:center;justify-content:center;height:100%;padding:24px}
.webgl-fail-card{max-width:420px;background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--accent);
  padding:20px;border-radius:3px;font-size:13.5px;line-height:1.5;color:var(--dim)}
.webgl-fail-card b{color:var(--text);display:block;margin-bottom:6px;font-size:15px}
.webgl-fail-card .btn{margin-top:12px}
.results{max-width:760px;margin:0 auto;padding:30px 22px;width:100%}
.score-hero{display:flex;align-items:center;gap:22px;margin-bottom:26px}
.grade{font-size:64px;font-weight:900;width:110px;height:110px;display:flex;align-items:center;justify-content:center;
  border:3px solid var(--accent);color:var(--accent);clip-path:polygon(0 0,100% 0,100% 78%,78% 100%,0 100%)}
.grade[data-g="C"],.grade[data-g="D"]{border-color:#d95d72;color:#d95d72}
.total{font-size:44px;font-weight:800;font-family:ui-monospace,monospace}
.total span{font-size:18px;color:var(--dim)}
.total-sub{font-size:13px;color:var(--dim)}
.bar-block{margin-bottom:20px}
.bar-head{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;margin-bottom:5px}
.bar-head em{font-style:normal;color:var(--dim);font-weight:500;font-size:11.5px}
.bar-head b{font-family:ui-monospace,monospace}
.bar{height:10px;background:var(--panel2);border:1px solid var(--line);border-radius:2px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--accent)}
.offenders{margin:7px 0 0;padding-left:18px;font-size:12.5px;color:var(--dim);line-height:1.5}
.clean{font-size:12px;color:#4cba6f;margin-top:5px}
.results-actions{display:flex;gap:10px;margin-top:26px;flex-wrap:wrap}
@media (max-width:760px){
  .tray{width:100%;max-height:none;border-right:none;border-bottom:1px solid var(--line)}
  .rack-row,.aisle-strip{grid-template-columns:52px repeat(5,1fr)}
  .slot-name{font-size:10.5px}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
`;
